  <!-- Bundler: image resources referenced as strings in JSX -->
  <meta name="ext-resource-dependency" content="assets/portfolio/01.png" data-resource-id="img01" />
  <meta name="ext-resource-dependency" content="assets/portfolio/02.png" data-resource-id="img02" />
  <meta name="ext-resource-dependency" content="assets/portfolio/03.png" data-resource-id="img03" />
  <meta name="ext-resource-dependency" content="assets/portfolio/05.png" data-resource-id="img05" />
  <meta name="ext-resource-dependency" content="assets/portfolio/06.png" data-resource-id="img06" />
  <meta name="ext-resource-dependency" content="assets/portfolio/07.png" data-resource-id="img07" />
  <meta name="ext-resource-dependency" content="assets/portfolio/08.png" data-resource-id="img08" />
  <meta name="ext-resource-dependency" content="assets/portfolio/final-55.png" data-resource-id="imgFinal55" />
  <meta name="ext-resource-dependency" content="assets/portfolio/final-66.png" data-resource-id="imgFinal66" />
  <meta name="ext-resource-dependency" content="assets/portfolio/shot-01.png" data-resource-id="imgShot01" />
  <meta name="ext-resource-dependency" content="assets/portfolio/shot-03.png" data-resource-id="imgShot03" />
  <meta name="ext-resource-dependency" content="assets/portfolio/shot-04.png" data-resource-id="imgShot04" />
  <meta name="ext-resource-dependency" content="assets/portfolio/shot-09.png" data-resource-id="imgShot09" />

  <script>
    // Map original asset paths → bundled blob URLs at runtime.
    // The bundler populates window.__resources before scripts run.
    window.__assetMap = {
      "assets/portfolio/01.png": "img01",
      "assets/portfolio/02.png": "img02",
      "assets/portfolio/03.png": "img03",
      "assets/portfolio/05.png": "img05",
      "assets/portfolio/06.png": "img06",
      "assets/portfolio/07.png": "img07",
      "assets/portfolio/08.png": "img08",
      "assets/portfolio/final-55.png": "imgFinal55",
      "assets/portfolio/final-66.png": "imgFinal66",
      "assets/portfolio/shot-01.png": "imgShot01",
      "assets/portfolio/shot-03.png": "imgShot03",
      "assets/portfolio/shot-04.png": "imgShot04",
      "assets/portfolio/shot-09.png": "imgShot09",
    };
    window.__resolveAsset = function(path) {
      if (!path) return path;
      var key = window.__assetMap[path];
      var r = window.__resources || {};
      return (key && r[key]) ? r[key] : path;
    };
    // Rewrite img.src and CSS background URLs as nodes are inserted.
    (function() {
      function fix(node) {
        if (!node || node.nodeType !== 1) return;
        if (node.tagName === 'IMG') {
          var s = node.getAttribute('src');
          if (s && window.__assetMap[s]) {
            var resolved = window.__resolveAsset(s);
            if (resolved !== s) node.setAttribute('src', resolved);
          }
        }
        var bg = node.style && node.style.backgroundImage;
        if (bg && bg.indexOf('assets/portfolio/') !== -1) {
          node.style.backgroundImage = bg.replace(/url\((['"]?)([^'")]+)\1\)/g, function(_, q, url) {
            return 'url(' + q + window.__resolveAsset(url) + q + ')';
          });
        }
        if (node.children) {
          for (var i = 0; i < node.children.length; i++) fix(node.children[i]);
        }
      }
      var mo = new MutationObserver(function(muts) {
        for (var i = 0; i < muts.length; i++) {
          var m = muts[i];
          for (var j = 0; j < m.addedNodes.length; j++) fix(m.addedNodes[j]);
          if (m.type === 'attributes' && m.target) fix(m.target);
        }
      });
      document.addEventListener('DOMContentLoaded', function() {
        fix(document.body);
        mo.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['src', 'style'] });
      });
    })();
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
